name: release-tenetc-snellius-h100
command: |
  bash -lc 'set -euo pipefail
  RUN_DIR="$PWD"
  repo="{repo}"
  master_repo="{master_repo}"
  julia="{julia}"
  cuda_module="{cuda_module}"
  cd "$repo"
  if [ -n "$cuda_module" ]; then
    for mod in $cuda_module; do
      module load "$mod"
    done
  fi
  mkdir -p "$RUN_DIR/results"
  export TENET_BENCH_BACKEND="cuda"
  export TENET_BENCH_CHIS="{chis}"
  export TENET_BENCH_WARMUP="{warmup}"
  export TENET_BENCH_REPEATS="{repeats}"
  export TENET_BENCH_TOL="{tol}"
  export TENET_BENCH_MAXITER="{maxiter}"
  export TENET_BENCH_KRYLOVDIM="{krylovdim}"
  export TENET_MASTER_COMMIT="{tenet_master_commit}"
  export TENET_MASTER_PATCH="{tenet_master_patch}"
  (
    echo "name=release-tenetc-snellius-h100"
    echo "repo=$repo"
    echo "master_repo=$master_repo"
    echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    echo "chis=$TENET_BENCH_CHIS"
    echo "cuda_module=$cuda_module"
    "$julia" --version
    which nvcc || true
    nvcc --version | head -1 || true
    nvidia-smi -L || true
    git -C "$repo" rev-parse HEAD 2>/dev/null || true
    git -C "$repo" status --short 2>/dev/null || true
    git -C "$master_repo" rev-parse HEAD 2>/dev/null || true
    git -C "$master_repo" status --short 2>/dev/null || true
  ) > "$RUN_DIR/host_env.txt" 2>&1
  "$julia" --project="$master_repo" --startup-file=no \
    "$repo/benchmarks/tenet/run_tenet_master.jl" 2>&1 | tee "$RUN_DIR/results/tenet_master.log"
  "$julia" --project="$repo/TeneTC" -e "using Pkg; Pkg.instantiate()"
  "$julia" --project="$repo/TeneTC" --startup-file=no \
    "$repo/benchmarks/tenet/run_tenetc.jl" 2>&1 | tee "$RUN_DIR/results/tenetc.log"
  grep TENET_MASTER_2DISING "$RUN_DIR/results/tenet_master.log" > "$RUN_DIR/results/master_summary.txt"
  grep TENETC_2DISING "$RUN_DIR/results/tenetc.log" > "$RUN_DIR/results/tenetc_summary.txt"
  python3 "$repo/benchmarks/tenet/compare_tenet_vs_tenetc.py" \
    "$RUN_DIR/results/master_summary.txt" \
    "$RUN_DIR/results/tenetc_summary.txt" \
    "$RUN_DIR/results/comparison.tsv"
  cat "$RUN_DIR/results/comparison.tsv"
  find "$RUN_DIR/results" -type f -print | sort > "$RUN_DIR/artifact_files.txt"'

params:
  repo: { type: str, default: "/home/qyang/source/LRIsing" }
  master_repo: { type: str, default: "/home/qyang/source/original_tenet_master_b9ac791_cuda" }
  julia: { type: str, default: "/gpfs/home1/qyang/.juliaup/bin/julia" }
  cuda_module: { type: str, default: "2025 CUDA/12.8.0" }
  chis: { type: str, default: "64,128,256" }
  warmup: { type: int, default: 2 }
  repeats: { type: int, default: 7 }
  tol: { type: str, default: "1e-10" }
  maxiter: { type: int, default: 20 }
  krylovdim: { type: int, default: 30 }
  tenet_master_commit: { type: str, default: "b9ac7919a96e930639935c9370ae568139bc8747" }
  tenet_master_patch: { type: str, default: "tenet_master_cuda_compat.patch" }

backends:
  - backend: slurm
    server: snellius

artifacts:
  - "host_env.txt"
  - "artifact_files.txt"
  - "results/*"
